[project]
name = "wels-frontend"
version = "0.1.0"
description = "WELS Handball Analytics — HTMX Frontend"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "jinja2>=3.1",
    "httpx>=0.28",
    "pydantic-settings>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "beautifulsoup4>=4.12",
    "ruff>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/frontend"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: end-to-end integration tests",
    "ui: tests that verify rendered HTML structure and content",
    "unit: isolated unit tests (default)",
]

[dependency-groups]
dev = [
    "ty>=0.0.25",
]
