[project]
name = "wels-ml"
version = "0.1.0"
description = "WELS Handball Analytics — ML model training and inference"
requires-python = ">=3.12,<3.14"
dependencies = [
    "duckdb>=1.2",
    "numpy>=1.26",
    "pandas>=2.2",
    "pydantic-settings>=2.0",
    "scikit-learn>=1.4",
    "torch>=2.1",
    "torch-geometric>=2.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.9",
]

[project.scripts]
wels-train = "ml.training.train:main"
wels-score = "ml.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ml"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: requires DuckDB data and GPU",
    "unit: isolated unit tests (default)",
]
