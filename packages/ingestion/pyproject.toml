[project]
name = "wels-ingestion"
version = "0.1.0"
description = "WELS Handball Analytics — Video ingestion and CV pipeline"
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.2",
    "numpy>=1.26",
    "opencv-python>=4.9",
    "pydantic-settings>=2.0",
    "scikit-learn>=1.4",
    "torch>=2.1",
    "ultralytics>=8.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.9",
]

[project.scripts]
wels-ingest = "ingestion.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ingestion"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: requires a real video file and GPU",
    "unit: isolated unit tests (default)",
]
