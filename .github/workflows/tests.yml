name: Tests

on:
  pull_request:
    branches: ["*"]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: cd packages/backend && uv sync --all-extras

      - name: Install frontend dependencies
        run: cd packages/frontend && uv sync --all-extras

      - name: Lint backend
        id: lint-backend
        run: cd packages/backend && uv run ruff check src/ tests/ 2>&1 | tee /tmp/lint-backend.txt
        continue-on-error: true

      - name: Lint frontend
        id: lint-frontend
        run: cd packages/frontend && uv run ruff check src/ tests/ 2>&1 | tee /tmp/lint-frontend.txt
        continue-on-error: true

      - name: Typecheck backend
        id: typecheck-backend
        run: cd packages/backend && uv run ty check --config-file ../../ty.toml --output-format github src/ 2>&1 | tee /tmp/typecheck-backend.txt
        continue-on-error: true

      - name: Typecheck frontend
        id: typecheck-frontend
        run: cd packages/frontend && uv run ty check --config-file ../../ty.toml --output-format github src/ 2>&1 | tee /tmp/typecheck-frontend.txt
        continue-on-error: true

      - name: Test backend
        id: test-backend
        run: cd packages/backend && uv run pytest --tb=short --junitxml=/tmp/backend-results.xml 2>&1 | tee /tmp/test-backend.txt
        continue-on-error: true

      - name: Test frontend
        id: test-frontend
        run: cd packages/frontend && uv run pytest --tb=short --junitxml=/tmp/frontend-results.xml 2>&1 | tee /tmp/test-frontend.txt
        continue-on-error: true

      - name: Build test summary
        id: summary
        if: always()
        run: |
          {
            echo "## 🧪 Test Results"
            echo ""

            # ── Lint ──
            echo "### Lint"
            echo ""
            if [ "${{ steps.lint-backend.outcome }}" = "success" ]; then
              echo "- ✅ **Backend** — passed"
            else
              echo "- ❌ **Backend** — failed"
              echo '  <details><summary>Output</summary>'
              echo ""
              echo '  ```'
              cat /tmp/lint-backend.txt
              echo '  ```'
              echo '  </details>'
            fi

            if [ "${{ steps.lint-frontend.outcome }}" = "success" ]; then
              echo "- ✅ **Frontend** — passed"
            else
              echo "- ❌ **Frontend** — failed"
              echo '  <details><summary>Output</summary>'
              echo ""
              echo '  ```'
              cat /tmp/lint-frontend.txt
              echo '  ```'
              echo '  </details>'
            fi

            echo ""
            echo "### Type Check"
            echo ""
            if [ "${{ steps.typecheck-backend.outcome }}" = "success" ]; then
              echo "- ✅ **Backend** — passed"
            else
              echo "- ❌ **Backend** — failed"
              echo '  <details><summary>Output</summary>'
              echo ""
              echo '  ```'
              cat /tmp/typecheck-backend.txt
              echo '  ```'
              echo '  </details>'
            fi

            if [ "${{ steps.typecheck-frontend.outcome }}" = "success" ]; then
              echo "- ✅ **Frontend** — passed"
            else
              echo "- ❌ **Frontend** — failed"
              echo '  <details><summary>Output</summary>'
              echo ""
              echo '  ```'
              cat /tmp/typecheck-frontend.txt
              echo '  ```'
              echo '  </details>'
            fi

            echo ""
            echo "### Tests"
            echo ""

            # ── Backend tests ──
            if [ "${{ steps.test-backend.outcome }}" = "success" ]; then
              BACKEND_LAST=$(tail -1 /tmp/test-backend.txt)
              echo "- ✅ **Backend** — $BACKEND_LAST"
            else
              BACKEND_LAST=$(tail -1 /tmp/test-backend.txt)
              echo "- ❌ **Backend** — $BACKEND_LAST"
              echo '  <details><summary>Output</summary>'
              echo ""
              echo '  ```'
              cat /tmp/test-backend.txt
              echo '  ```'
              echo '  </details>'
            fi

            # ── Frontend tests ──
            if [ "${{ steps.test-frontend.outcome }}" = "success" ]; then
              FRONTEND_LAST=$(tail -1 /tmp/test-frontend.txt)
              echo "- ✅ **Frontend** — $FRONTEND_LAST"
            else
              FRONTEND_LAST=$(tail -1 /tmp/test-frontend.txt)
              echo "- ❌ **Frontend** — $FRONTEND_LAST"
              echo '  <details><summary>Output</summary>'
              echo ""
              echo '  ```'
              cat /tmp/test-frontend.txt
              echo '  ```'
              echo '  </details>'
            fi

            echo ""

            # ── Overall ──
            if [ "${{ steps.lint-backend.outcome }}" = "success" ] && \
               [ "${{ steps.lint-frontend.outcome }}" = "success" ] && \
               [ "${{ steps.typecheck-backend.outcome }}" = "success" ] && \
               [ "${{ steps.typecheck-frontend.outcome }}" = "success" ] && \
               [ "${{ steps.test-backend.outcome }}" = "success" ] && \
               [ "${{ steps.test-frontend.outcome }}" = "success" ]; then
              echo "**All checks passed** ✅"
            else
              echo "**Some checks failed** — see details above ❌"
            fi
          } > /tmp/summary.md

          cat /tmp/summary.md

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        if: always()
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "## 🧪 Test Results"

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        if: always()
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body-path: /tmp/summary.md

      - name: Fail if any check failed
        if: always()
        run: |
          if [ "${{ steps.lint-backend.outcome }}" != "success" ] || \
             [ "${{ steps.lint-frontend.outcome }}" != "success" ] || \
             [ "${{ steps.typecheck-backend.outcome }}" != "success" ] || \
             [ "${{ steps.typecheck-frontend.outcome }}" != "success" ] || \
             [ "${{ steps.test-backend.outcome }}" != "success" ] || \
             [ "${{ steps.test-frontend.outcome }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
