site_name: WELS — Handball Analytics
site_description: Documentation for the WELS handball analytics platform
repo_url: https://github.com/your-org/wels-monorepo

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/backend/src
            - packages/ingestion/src
            - packages/ml/src
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Ingestion:
      - Overview: ingestion/overview.md
      - Running: ingestion/running.md
      - Pipeline internals: ingestion/pipeline.md
  - Storage: storage.md
  - ML:
      - Overview: ml/overview.md
      - Training: ml/training.md
  - Backend:
      - Overview: backend/overview.md
      - API Reference: backend/api.md
  - Frontend:
      - Overview: frontend/overview.md
      - Components: frontend/components.md
  - Contributing: contributing.md
